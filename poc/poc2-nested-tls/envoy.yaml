admin:
  address: { socket_address: { address: 0.0.0.0, port_value: 9901 } }

# Required to use internal_listener (the loopback target).
bootstrap_extensions:
- name: envoy.bootstrap.internal_listener
  typed_config:
    "@type": type.googleapis.com/envoy.extensions.bootstrap.internal_listener.v3.InternalListener

static_resources:
  listeners:

  # ---- Public listener :10000 — terminates OUTER TLS, forwards inner-TLS bytes to the
  #      internal listener via tcp_proxy (the loopback). ----
  - name: public
    address: { socket_address: { address: 0.0.0.0, port_value: 10000 } }
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain: { filename: /etc/envoy/certs/outer.crt }
              private_key:        { filename: /etc/envoy/certs/outer.key }
      filters:
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: outer_to_inner
          cluster: inner_cluster

  # ---- Internal listener (loopback, no socket address) — terminates INNER TLS, runs WASM. ----
  - name: inner
    internal_listener: {}
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            alpn_protocols: ["h2", "http/1.1"]
            tls_certificates:
            - certificate_chain: { filename: /etc/envoy/certs/inner.crt }
              private_key:        { filename: /etc/envoy/certs/inner.key }
      filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: inner
          codec_type: AUTO
          route_config:
            name: local
            virtual_hosts:
            - name: vh
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                direct_response: { status: 200, body: { inline_string: "inner-ok\n" } }
          http_filters:
          - name: envoy.filters.http.wasm
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
              config:
                name: probe
                root_id: probe
                vm_config:
                  runtime: envoy.wasm.runtime.v8
                  vm_id: probe_vm
                  code: { local: { filename: /etc/envoy/probe.wasm } }
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # Routes tcp_proxy output into the internal listener (the loopback target).
  - name: inner_cluster
    load_assignment:
      cluster_name: inner_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              envoy_internal_address:
                server_listener_name: inner
