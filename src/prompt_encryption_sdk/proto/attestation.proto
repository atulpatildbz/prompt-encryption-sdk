syntax = "proto3";

package prompt_encryption_sdk;

service AttestedTls {
  // AttestConnection performs the post-handshake attestation.
  rpc AttestConnection(AttestConnectionRequest)
      returns (AttestConnectionResponse);
}

// VerifierType defines the supported attestation mechanisms.
enum VerifierType {
  VERIFIER_TYPE_UNSPECIFIED = 0;
  // Google Cloud Attestation (GCA)
  VERIFIER_TYPE_GCA = 1;
}

message AttestConnectionRequest {
  // A list of verifiers that the server must be endorsed by.
  repeated VerifierType required_verifier_type = 1;
  // A random nonce for generating unique TLS session material.
  bytes nonce = 2;
}

// GcaTrustBundle contains the materials needed to verify a GCA-based
// attestation.
message GcaTrustBundle {
  // The signed JWT attestation token from GCA.
  string attestation_token = 1;
}

// AttestationEvidence contains the proof of endorsement from a single RoT.
message AttestationEvidence {
  // The type of evidence, must be one requested by the client.
  VerifierType verifier_type = 1;
  // The attestation materials for the RoT.
  oneof trust_bundle {
    GcaTrustBundle gca_bundle = 2;
  }
}

message EcdsaP256PublicKey {
  bytes key_bytes = 1;
}

// AttestConnectionResponse is sent by the server to the client. It is sent only
// if the server can satisfy all of the client's required RoTs.
message AttestConnectionResponse {
  // A list of evidence, one for each RoT requested.
  repeated AttestationEvidence evidence = 1;
  // The common public key endorsed by all evidence bundles.
  EcdsaP256PublicKey instance_public_key = 2;
  // signature over a value derived from the TLS session's master secret.
  // This binds the attestation to this specific TLS session.
  bytes session_signature = 3;
}

// Enum for the supported TEE hardware CPU models.
enum HardwareModel {
  HARDWARE_MODEL_UNSPECIFIED = 0;
  HARDWARE_MODEL_TDX = 1;
  HARDWARE_MODEL_SEV = 2;
  HARDWARE_MODEL_SEV_SNP = 3;
}

// Defines the validation rules for the confidential workload itself.
message WorkloadPolicy {
  // The SHA256 hash of the trusted workload image.
  string image_hash = 1;

  // The resource name of the KMS signing key used to sign the workload image.
  // e.g.,
  // "projects/p/locations/l/keyRings/r/cryptoKeys/k/cryptoKeyVersions/v"
  string signing_key_id = 2;
}

// Defines the expected properties of the GCE instance running the workload.
message GceInstancePolicy {
  string project_id = 1;
  string zone = 2;
  string instance_id = 3;
  string instance_name = 4;
}

// AttestationPolicy defines the rules for validating an attestation report.
message AttestationPolicy {
  // The required TEE hardware model, e.g., "TDX" or "SEV".
  HardwareModel hw_model = 1;
  // The policy that the server workload must satisfy.
  WorkloadPolicy workload = 2;
  // The policy describing the expected GCE instance properties.
  GceInstancePolicy gce_instance = 3;
}
