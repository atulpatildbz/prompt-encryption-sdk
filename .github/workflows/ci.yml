name: SDK CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdk-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libssl-dev

      - name: Install SDK and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[test,server]'

      - name: Run tests
        run: python -m pytest -q

      - name: Check installed dependencies
        run: python -m pip check

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libssl-dev

      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build==1.5.0 twine==6.2.0
          python -m build
          python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  required:
    name: Required CI
    if: ${{ always() }}
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to pass
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [[ "${TEST_RESULT}" != "success" || "${BUILD_RESULT}" != "success" ]]; then
            echo "Test result: ${TEST_RESULT}"
            echo "Build result: ${BUILD_RESULT}"
            exit 1
          fi
